spring:
  profiles:
    active: local

server:
  forward-headers-strategy: framework
  servlet:
    contextPath: /
    multipart:
      max-file-size: 16MB
  error:
    whitelabel:
      enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    # Добавляем эти две строчки, чтобы Swagger знал, куда стучаться через Nginx
    config-url: /api/v3/api-docs/swagger-config
    url: /api/v3/api-docs

info:
  app:
    name: ${spring.application.name}
    version: "@application.version@"
    description: "@application.description@"

